<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通話中: {{ thread.title }}</title>
    <style>body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }</style>
</head>
<body>
    <div id="meet" style="height: 100vh; width: 100vw;"></div>
    <script src='https://jit.si'></script>
    <script>
        const domain = "meet.jit.si";
        const options = {
            roomName: "nori-bbs-{{ thread.id }}",
            parentNode: document.querySelector('#meet'),
            userInfo: { displayName: "{{ current_user.username }}" }
        };
        const api = new JitsiMeetExternalAPI(domain, options);
        // 通話が終了（退出ボタン）したら掲示板に戻る
        api.addEventListener('videoConferenceLeft', () => {
            window.location.href = "/thread/{{ thread.id }}";
        });
    </script>
</body>
</html>
