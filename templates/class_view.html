<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ target_class.name }}</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding-bottom: 40px; }
        .header { background: white; padding: 16px; border-bottom: 1px solid #d1d1d6; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .back-link { position: absolute; left: 16px; text-decoration: none; color: #007bff; font-size: 16px; }
        
        .member-scroll { display: flex; overflow-x: auto; padding: 12px; gap: 8px; background: #fff; border-bottom: 1px solid #d1d1d6; }
        .member-badge { white-space: nowrap; background: #e5e5ea; padding: 6px 14px; border-radius: 20px; font-size: 13px; }
        .member-badge::before { content: "●"; color: #34c759; margin-right: 4px; font-size: 10px; }
        
        .content { padding: 16px; max-width: 500px; margin: auto; }
        .create-box { background: white; padding: 16px; border-radius: 16px; margin-bottom: 20px; display: flex; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .create-box input { flex: 1; padding: 10px; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 15px; }
        .btn-add { background: #34c759; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; }

        /* スレッドカードの構造を修正 */
        .thread-card { background: white; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.03); overflow: hidden; }
        .thread-link { flex: 1; padding: 20px; text-decoration: none; color: #1c1c1e; font-size: 17px; font-weight: bold; }
        .delete-area { padding: 0 16px; }
        .delete-btn { text-decoration: none; font-size: 20px; display: block; padding: 10px; }
    </style>
</head>
<body>
<div class="header">
    <a href="/" class="back-link">← 戻る</a>
    <strong style="font-size:18px;">{{ target_class.name }}</strong>
</div>

<div class="member-scroll">
    {% for m in members %}<div class="member-badge">{{ m.username }}</div>{% endfor %}
</div>

<div class="content">
    <form action="/create_thread/{{ target_class.id }}" method="POST" class="create-box">
        <input type="text" name="title" placeholder="新しいスレッド..." required>
        <button type="submit" class="btn-add">作成</button>
    </form>

    {% for t in threads %}
    <div class="thread-card">
        <a href="/thread/{{ t.id }}" class="thread-link"># {{ t.title }}</a>
        <div class="delete-area">
            <a href="/delete_thread/{{ t.id }}" class="delete-btn" onclick="return confirm('このスレッドを削除しますか？')">🗑</a>
        </div>
    </div>
    {% endfor %}

    <footer style="text-align:center; color:#8e8e93; font-size:11px; margin-top:40px;">&copy; 2024 nori1213</footer>
</div>
</body>
</html>
