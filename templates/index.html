<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクラス掲示板</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .class-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #007bff; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; color: white; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <h1>こんにちは、{{ current_user.username }}さん</h1>

    <div class="box">
        <form action="/manage_class" method="POST" style="display:flex; gap:10px; flex-wrap:wrap;">
            <input type="text" name="code" placeholder="クラスコードを入力">
            <button type="submit" name="action" value="join" class="btn" style="background:#007bff;">参加する</button>
            <span style="align-self:center;">または</span>
            <input type="text" name="name" placeholder="新しいクラス名">
            <button type="submit" name="action" value="create" class="btn" style="background:#28a745;">作成</button>
        </form>
    </div>

    <h2>参加中のクラス一覧</h2>
    {% for c in current_user.classrooms %}
    <div class="class-card">
        <div>
            <strong style="font-size:1.2em;">{{ c.name }}</strong><br>
            <small style="color:#888;">コード: {{ c.code }}</small>
        </div>
        <a href="/class/{{ c.id }}" class="btn" style="background:#007bff;">入室する</a>
    </div>
    {% else %}
    <p>まだクラスに参加していません。</p>
    {% endfor %}
    
    <hr>
    <a href="/logout" style="color:red;">ログアウト</a>
</body>
</html>
