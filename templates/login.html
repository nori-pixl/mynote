<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - マイクラス掲示板</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-login:hover { background: #0056b3; }
        .footer-text { margin-top: 15px; font-size: 13px; color: #666; }
        .footer-text a { color: #007bff; text-decoration: none; }
        .error-msg { color: #ff4d4d; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>ログイン</h2>

    <!-- エラーメッセージ表示 -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error-msg">{% for message in messages %}{{ message }}{% endfor %}</div>
      {% endif %}
    {% endwith %}

    <form method="POST" id="login-form">
        <input type="text" name="username" id="u" placeholder="名前" required autofocus>
        <input type="password" name="password" id="p" placeholder="パスワード" required>
        <button type="submit" class="btn-login">ログイン</button>
    </form>

    <div class="footer-text">
        アカウントがない？ <a href="/signup">新規登録</a>
    </div>
</div>

<script>
    // ページ読み込み時の処理
    window.onload = function() {
        const savedU = localStorage.getItem('bbs_u');
        const savedP = localStorage.getItem('bbs_p');
        
        if (savedU && savedP) {
            document.getElementById('u').value = savedU;
            document.getElementById('p').value = savedP;
            
            // サーバー側でログインが切れて飛ばされてきた場合、
            // 0.5秒後に自動でログインボタンを押す（超速復帰）
            setTimeout(() => {
                document.getElementById('login-form').submit();
            }, 500);
        }
    };

    // フォーム送信時に情報をローカルストレージに保存する
    document.getElementById('login-form').onsubmit = function() {
        localStorage.setItem('bbs_u', document.getElementById('u').value);
        localStorage.setItem('bbs_p', document.getElementById('p').value);
    };
</script>

</body>
</html>
