<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ログイン</title></head>
<body style="font-family:sans-serif; background:#f0f2f5; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div style="background:white; padding:30px; border-radius:12px; width:300px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <h2>ログイン</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="名前" required style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
            <input type="password" name="password" placeholder="パスワード" required style="width:100%; padding:10px; margin-bottom:15px; box-sizing:border-box;">
            <button type="submit" style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:6px; font-weight:bold;">ログイン</button>
        </form>
        <p style="font-size:12px; margin-top:15px;">アカウントがない？ <a href="/signup">新規登録</a></p>
    </div>
</body>
</html>
