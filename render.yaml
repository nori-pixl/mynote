services:
  - type: web
    name: live-bbs
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: bbs-data
      mountPath: /opt/render/project/src/static/uploads
      sizeGB: 1
    envVars:
      - key: DISK_PATH
        value: /opt/render/project/src/static/uploads
